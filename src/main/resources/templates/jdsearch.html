<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>Java-ES仿京东搜索</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
  .pagination { text-align: center; margin: 30px 0; font-size: 14px; color: #333; }
  .page-btn { padding: 6px 12px; margin: 0 4px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 2px; }
  .page-btn:hover:not(:disabled) { border-color: #e4393c; color: #e4393c; }
  .page-btn:disabled { color: #ccc; cursor: not-allowed; }
  .page-btn.active { border: none; background-color: #e4393c; color: #fff; font-weight: bold; }
  .page-ellipsis { margin: 0 4px; color: #999; }
  .page-text { margin-left: 10px; }
  .page-input { width: 40px; height: 26px; border: 1px solid #ddd; text-align: center; outline: none; margin: 0 5px; }
  </style>
</head>

<body class="pg">
<div class="page" id="app">
  <div id="mallPage" class=" mallist tmall- page-not-market ">

    <!-- 头部搜索 -->
    <div id="header" class=" header-list-app">
      <div class="headerLayout">
        <div class="headerCon ">
          <!-- Logo-->
          <h1 id="mallLogo">
            <img th:src="@{/images/jdlogo.png}" alt="">
          </h1>

          <div class="header-extra">

            <!--搜索                        <input v-model.trim="keyword" id="keyword" @keyup="getAddress">-->
            <div id="mallSearch" class="mall-search">
              <form name="searchTop" class="mallSearch-form clearfix">
                <fieldset>
                  <legend>天猫搜索</legend>
                  <div class="mallSearch-input clearfix">
                    <div class="s-combobox" id="s-combobox-685">
                      <div class="s-combobox-input-wrap">
                        <input v-model="keyword" type="text" autocomplete="off" value="" id="mq"
                               class="s-combobox-input" aria-haspopup="true">
                      </div>
                    </div>
                    <button @click.prevent="clickSearchBtn" type="submit" id="searchbtn">搜索</button>
                  </div>
                </fieldset>
              </form>
              <ul class="relKeyTop">
                <li><a @click="quickSearch('Java')" style="cursor: pointer;">Java</a></li>
                <li><a @click="quickSearch('Python')" style="cursor: pointer;">Python</a></li>
                <li><a @click="quickSearch('机器学习')" style="cursor: pointer;">机器学习</a></li>
                <li><a @click="quickSearch('手机')" style="cursor: pointer;">手机</a></li>
                <li><a @click="quickSearch('电脑')" style="cursor: pointer;">电脑</a></li>
                <li><a @click="quickSearch('人工智能')" style="cursor: pointer;">人工智能</a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="main">
      <!-- 品牌分类 -->
      <form class="navAttrsForm">
        <div class="attrs j_NavAttrs" style="display:block">
          <div class="brandAttr j_nav_brand">
            <div class="j_Brand attr">
              <div class="attrKey">
                品牌
              </div>
              <div class="attrValues">
                <ul class="av-collapse row-2">
                  <li><a @click="quickSearch('机器问答')" style="cursor: pointer;"> 机器问答 </a></li>
                  <li><a @click="quickSearch('信息检索')" style="cursor: pointer;"> 信息检索 </a></li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </form>

      <!-- 排序规则 -->
      <div class="filter clearfix">
          <a class="fSort" @click="changeSort(0)">综合</a>
          <a class="fSort" @click="changeSort(1)">价格上升↑</a>
          <a class="fSort" @click="changeSort(2)">价格下降↓</a>
      </div>

      <!-- 商品详情 -->
      <div class="view grid-nosku">

        <div class="product" v-for="item in results">
          <div class="product-iWrap">
            <!--商品封面-->
            <div class="productImg-wrap">
              <a class="productImg">
                <img :src="item.img">
              </a>
            </div>
            <!--价格-->
            <p class="productPrice">
              <em>{{item.price}}</em>
            </p>
            <!--标题-->
            <p class="productTitle">
              <a v-html="item.title"></a>
            </p>
            <!-- 店铺名 -->
            <div class="productShop">
              <span>店铺： 实践课 </span>
            </div>
            <!-- 成交信息
            <p class="productStatus">
              <span>月成交<em>999笔</em></span>
              <span>评价 <a>3</a></span>
            </p> -->
          </div>
        </div>
      </div>
      <!-- 【新增】：分页组件 -->
      <div class="pagination" v-if="totalPage > 0">
          <button @click="changePage(pageNo - 1)" :disabled="pageNo <= 1">上一页</button>
          
          <!-- 页码列表 (动态计算显示的页码) -->
          <button v-for="page in pageList" :key="page" 
                  @click="changePage(page)" 
                  :class="{'active': page === pageNo}">
              {{ page }}
          </button>

          <button @click="changePage(pageNo + 1)" :disabled="pageNo >= totalPage">下一页</button>
          
          <span class="page-info">共 {{totalPage}} 页 到第</span>
          <input type="number" v-model.number="jumpPageNum" class="jump-input">
          <span class="page-info">页</span>
          <button @click="jumpPage">确定</button>
      </div>
      <!-- main 结束 -->
    </div>
  </div>
</div>
</div>
</body>

<script src="./js/vue.min.js"></script>
<script src="./js/axios.min.js"></script>
<script type="text/javascript">
  var vm = new Vue({
    el:'#app',
    data:{
      keyword:"",  //搜索关键字
      currentKeyword: "Java", //当前搜索的关键字（用于显示在页面上）
      s1:"localhost:8080/search/java/1/10",
      address:"",
      results:[] ,  //搜索结果
      sortRule: 0,

      pageNo: 1,        // 当前页码
      pageSize: 40,     // 每页显示几条（你可以根据需要改成 20 或 30）
      totalHits: 0,     // 总商品条数
      totalPage: 0,     // 总页数
      jumpPageNum: ''   // 跳转输入框绑定的值
    },
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8'
    },
    computed: {
      // 【新增】动态计算要显示的页码（实现类似 1 2 3 4 5 的滑动窗口）
      pageList() {
          let pages =[];
          // 假设我们最多显示 5 个页码按钮
          let start = Math.max(1, this.pageNo - 2);
          let end = Math.min(this.totalPage, start + 4);
          
          // 调整首尾边界，确保即使在末尾也能显示够 5 个按钮（如果总页数>=5）
          if (end - start < 4) {
              start = Math.max(1, end - 4);
          }
          
          for (let i = start; i <= end; i++) {
              pages.push(i);
          }
          return pages;
      }
    },
    methods: {
        quickSearch(kw) {
              this.keyword = kw;       // 将点击的词填入搜索框
              this.clickSearchBtn();   // 直接复用点击搜索按钮的逻辑（包含重置页码等）
          },
      // 1. 当用户点击红色的【搜索按钮】时触发
       clickSearchBtn() {
          if (!this.keyword) {
              alert("请输入搜索关键词！");
              return;
          }
          this.currentKeyword = this.keyword; 
          this.sortRule = 0; // 重置为“综合排序”
          this.pageNo = 1;   // 【重要】新搜索必须从第 1 页开始看！
          this.doSearch(); 
      },
      
      // 2. 当用户点击【排序按钮】时触发
      changeSort(rule) {
          this.sortRule = rule; 
          this.pageNo = 1;   // 【重要】切换排序时，也要回到第 1 页！
          this.doSearch();      
      },
      changePage(page) {
          if (page >= 1 && page <= this.totalPage) {
              this.pageNo = page;
              this.doSearch(); 
              // 翻页后页面自动滚回顶部
              window.scrollTo(0, 0);
          }
      },
      jumpPage() {
          let p = parseInt(this.jumpPageNum);
          if (p && p >= 1 && p <= this.totalPage) {
              this.changePage(p);
          } else {
              alert("请输入有效的页码范围：1 ~ " + this.totalPage);
          }
      },
      // 3. 真正负责和后端交互的底层方法
      doSearch() {
        console.info("发起请求 -> 关键词:", this.currentKeyword, " | 页码:", this.pageNo, " | 排序:", this.sortRule);
        
        axios.request({
            method: "POST",
            url: "http://localhost:8080/query",
            params: {
              keyword: this.currentKeyword, 
              pageNo: this.pageNo,      // 传入动态页码
              pageSize: this.pageSize,  // 传入每页条数
              sortRule: this.sortRule   
            }
        }).then(response => {
            // 【重要修改】因为我们在后端第一步把返回值改成了 Map，所以这里提取数据的方式变了！
            // response.data 现在是 Map对象 { "data": [...商品列表], "total": 123总数 }
            
            let resList = response.data.list;

            // 【新增】：前端实现关键词高亮逻辑
            if (this.currentKeyword && resList && resList.length > 0) {
                let reg = new RegExp(this.currentKeyword, 'ig'); 
                
                resList.forEach(item => {
                    if (item.title) {
                        item.title = item.title.replace(reg, match => {
                            return `<span style="color: #e4393c; font-weight: bold;">${match}</span>`;
                        });
                    }
                });
              }

            this.results = resList;       // 获取商品数组
            this.totalHits = response.data.total;    // 获取总条数
            
            // 计算总页数：向上取整 (例如 21条 / 10 = 3页)
            this.totalPage = Math.ceil(this.totalHits / this.pageSize);
            
            console.log("当前页返回条数:", this.results.length, "总页数:", this.totalPage);
        }).catch(error => {
            console.error("搜索失败:", error);
        })
      }
    },
    // 新增：页面刚打开时，自动根据默认词（手机）搜一次，让页面不至于空白
    mounted() {
        this.doSearch();
    }
  })
</script>

</html>
